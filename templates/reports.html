{% extends 'base.html' %}
{% block content %}

<h2>Player Network Visualization</h2>

<div style="margin-bottom: 20px;">
    <form method="POST">
        <label>Select a Player:</label>
        <select name="player_name">
            {% for p in players %}
                <option value="{{ p.Name }}" {% if p.Name == selected_player %}selected{% endif %}>{{ p.Name }}</option>
            {% endfor %}
        </select>
        <button type="submit">Visualize Teammates</button>
    </form>
</div>

{% if selected_player %}
    <h3>Teammate Network for: {{ selected_player }}</h3>
    <div id="cy" style="width: 100%; height: 500px; background-color: #f8f9fa; border: 1px solid #ccc; border-radius: 8px;"></div>
{% endif %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
<script>
    {% if selected_player %}
    // Fetch data for the specific selected player
    fetch('/api/graph-data/{{ selected_player }}')
        .then(res => res.json())
        .then(data => {
            var cy = cytoscape({
                container: document.getElementById('cy'),
                elements: data.elements,
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'background-color': '#2f3542',
                            'color': '#fff',
                            'text-valign': 'center',
                            'text-halign': 'center',
                            'font-size': '12px',
                            'width': 50,
                            'height': 50,
                            'text-outline-width': 2,
                            'text-outline-color': '#2f3542'
                        }
                    },
                    {
                        selector: 'node[type="team"]',
                        style: {
                            'background-color': '#ff4757',
                            'text-outline-color': '#ff4757',
                            'shape': 'rectangle'
                        }
                    },
                    {
                        selector: 'edge',
                        style: { 
                            'width': 3, 
                            'line-color': '#adb5bd',
                            'curve-style': 'bezier',
                            'target-arrow-shape': 'triangle',
                            'target-arrow-color': '#adb5bd'
                        }
                    }
                ],
                layout: { 
                    name: 'cose', 
                    padding: 50,
                    animate: true 
                }
            });
        });
    {% endif %}
</script>
{% endblock %}

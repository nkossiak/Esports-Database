<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Esports Network</title>
    <style>
        body { font-family: 'Exo 2', sans-serif; margin: 0; background: #5d5863; color: #222; }
        header { background: #33285b; color: white; padding: 16px 24px; }
        nav a { color: white; margin-right: 14px; text-decoration: none; }
        main { max-width: 1000px; margin: 24px auto; background: white; padding: 24px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #eef2ff; }
        form { display: grid; gap: 10px; margin-top: 12px; margin-bottom: 24px; }
        input, select, button { padding: 8px; font-size: 14px; }
        button { width: fit-content; cursor: pointer; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .card { background: #eef2ff; padding: 14px; border-radius: 8px; }
        .flash { background: #dcfce7; border: 1px solid #86efac; padding: 10px; margin-bottom: 12px; }
</style>
</head>
<body>
    <header>
        <h1>Competitive Esports Network</h1>
        <nav>
            <a href="{{ url_for('index') }}">Home</a>
            <a href="{{ url_for('players') }}">Players</a>
            <a href="{{ url_for('teams') }}">Teams</a>
            <a href="{{ url_for('tournaments') }}">Tournaments</a>
            <a href="{{ url_for('plays_for') }}">Plays For</a>
            <a href="{{ url_for('played_in') }}">Played In</a>
            <a href="{{ url_for('reports') }}">Reports</a>
        </nav>
    </header>
    <main>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>

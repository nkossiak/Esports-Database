<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Esports Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #5d5863;
            --panel-soft: #1a1d25;
            --line: #2a2f3a;
            --text: #eef1f7;
            --muted: #a2aabc;
            --soft-purple: #1b1730;

            --header: #05060a;
            --header-line: #1a1d25;
            --header-text: #d9deea;
            --header-muted: #9aa2b3;
            --accent: #a855f7;
            --accent-soft: rgba(168, 85, 247, 0.14);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            margin: 0;
            background: linear-gradient(180deg, #05060a 0%, #05060a 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .site-header {
            background: var(--header);
            border-bottom: 1px solid var(--header-line);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-wrap {
            max-width: 1300px;
            margin: 0 auto;
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 0 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: white;
            flex-shrink: 0;
        }

        .brand-mark {
            font-size: 1.8rem;
            color: var(--accent);
            line-height: 1;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1;
        }

        .brand-top {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.3px;
        }

        .brand-bottom {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--header-muted);
            margin-top: 3px;
        }

        nav.main-nav {
            display: flex;
            align-items: center;
            gap: 2px;
            flex: 1;
            margin-left: 28px;
            flex-wrap: wrap;
        }

        nav.main-nav a {
            color: var(--header-text);
            text-decoration: none;
            padding: 24px 12px 20px;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        nav.main-nav a:hover {
            color: white;
            border-bottom-color: var(--accent);
            background: rgba(255, 255, 255, 0.03);
        }

        nav.main-nav a.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
            background: transparent;
        }

        main {
            max-width: 1300px;
            margin: 24px auto;
            background: linear-gradient(var(--panel));
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
        }

        h1, h2, h3 {
            color: #f3ecff;
        }

        p {
            color: var(--muted);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            overflow: hidden;
            border-radius: 12px;
        }

        th, td {
            border: none;
            padding: 10px 12px;
            text-align: left;
        }

        th {
            background: var(--soft-purple);
            color: #efe6ff;
        }

        td {
            background: #161922;
            color: var(--text);
        }

        tr:nth-child(even) td {
            background: #11141c;
        }

        form {
            display: grid;
            gap: 10px;
            margin-top: 12px;
            margin-bottom: 0;
        }

        input, select, button {
            padding: 10px 12px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #313646;
            font-family: inherit;
        }

        input, select {
            background: #171a22;
            color: var(--text);
            width: 100%;
        }

        input:focus, select:focus {
            outline: 2px solid rgba(168, 85, 247, 0.35);
            border-color: #a855f7;
        }

        button {
            width: fit-content;
            cursor: pointer;
            background: #6d28d9;
            color: white;
            border: none;
            font-weight: 600;
            box-shadow: 0 8px 18px rgba(109, 40, 217, 0.22);
            transition: background 0.2s ease;
        }

        button:hover {
            background: #7c3aed;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .card {
            background: linear-gradient(180deg, #050a06 0%, #534f59 100%);
            padding: 16px;
            border-radius: 6px;
            border: none;
            box-shadow: none;
            color: var(--text);
        }

        .card strong {
            color: #f3ecff;
        }

        .section-note {
            background: var(--panel-soft);
            border: none;
            border-radius: 6px;
            padding: 14px 16px;
            margin-bottom: 18px;
            color: var(--muted);
        }

        .data-layout {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 18px;
            align-items: start;
        }

        .side-card {
            background: rgba(10, 12, 18, 0.88);
            border-radius: 8px;
            padding: 16px;
            position: sticky;
            top: 92px;
        }

        .side-card h3 {
            margin: 0 0 6px 0;
            font-size: 1.08rem;
        }

        .side-card p {
            margin: 0 0 14px 0;
            font-size: 0.88rem;
            line-height: 1.4;
            color: #9aa2b3;
        }

        .side-card label {
            display: block;
            margin-bottom: 6px;
            color: #efe6ff;
            font-size: 0.83rem;
            font-weight: 600;
        }

        .side-card button,
        .side-card .full-width-btn {
            width: 100%;
        }

        .content-card {
            min-width: 0;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }

        .page-header h2 {
            margin: 0;
            font-size: 1.75rem;
        }

        .page-chip {
            background: #33285b;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        @media (max-width: 1100px) {
            main {
                max-width: min(1000px, calc(100vw - 32px));
                padding: 20px;
            }

            .data-layout {
                grid-template-columns: 1fr;
            }

            .side-card {
                position: static;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-wrap">
            <a href="{{ url_for('index') }}" class="brand">
                <span class="brand-mark">◖</span>
                <div class="brand-text">
                    <span class="brand-top">ESPORTS</span>
                    <span class="brand-bottom">NETWORK</span>
                </div>
            </a>

            <nav class="main-nav">
                <a href="{{ url_for('index') }}" class="{{ 'active' if active_page == 'reports' else '' }}">Reports</a>
                <a href="{{ url_for('players_page') }}" class="{{ 'active' if active_page == 'players' else '' }}">Players</a>
                <a href="{{ url_for('teams') }}" class="{{ 'active' if active_page == 'teams' else '' }}">Teams</a>
                <a href="{{ url_for('tournaments') }}" class="{{ 'active' if active_page == 'tournaments' else '' }}">Tournaments</a>
                <a href="{{ url_for('plays_for') }}" class="{{ 'active' if active_page == 'plays_for' else '' }}">Plays For</a>
                <a href="{{ url_for('played_in') }}" class="{{ 'active' if active_page == 'played_in' else '' }}">Played In</a>
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>

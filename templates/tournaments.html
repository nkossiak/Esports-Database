{% extends 'base.html' %}
{% block content %}
<h2>Esports Tournaments</h2>

<form method="POST">
    <input name="name" placeholder="Tournament Name" required>
    <input name="country" placeholder="Host Country">
    <input name="founded_year" type="number" placeholder="Year">
    <input name="prize_pool" placeholder="Prize Pool ($)">
    <button type="submit">Add Tournament</button>
</form>

<table>
    <thead>
        <tr>
            <th>NodeID</th>
            <th>Name</th>
            <th>Location</th>
            <th>Year</th>
            <th>Prize Pool</th>
        </tr>
    </thead>
    <tbody>
        {% for t in tournaments %}
        <tr>
            <td>{{ t.NodeID }}</td>
            <td><strong>{{ t.Name }}</strong></td>
            <td>{{ t.attr.country }}</td>
            <td>{{ t.attr.year }}</td>
            <td>{{ t.attr.prize_pool }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<h2>Add Player Node</h2>
<form method="POST">
    <input name="name" placeholder="Full Name" required>
    <input name="username" placeholder="Username" required>
    <input name="country" placeholder="Country">
    <button type="submit">Add Node</button>
</form>

<table>
    <tr><th>ID</th><th>Name</th><th>Attributes (JSON)</th></tr>
    {% for p in players %}
    <tr>
        <td>{{ p.NodeID }}</td>
        <td>{{ p.Name }}</td>
        <td>{{ p.Attributes }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

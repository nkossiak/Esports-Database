{% extends 'base.html' %}
{% block content %}
<h2>Players</h2>
<form method="POST">
    <input name="name" placeholder="Player Name" required>
    <input name="username" placeholder="Username" required>
    <input name="country" placeholder="Country">
    <input name="birth_year" type="number" placeholder="Birth Year">
    <input name="first_year" type="number" placeholder="First Year">
    <button type="submit">Add Player</button>
</form>

<table>
    <tr><th>ID</th><th>Name</th><th>Username</th><th>Country</th><th>Birth Year</th><th>First Year</th></tr>
    {% for player in players %}
    <tr>
        <td>{{ player.player_id }}</td>
        <td>{{ player.name }}</td>
        <td>{{ player.username }}</td>
        <td>{{ player.country }}</td>
        <td>{{ player.birth_year or '' }}</td>
        <td>{{ player.first_year or '' }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}

{% extends 'base.html' %}
{% block content %}
<h2>Competitive Teams</h2>

<form method="POST">
    <input name="name" placeholder="Team Name" required>
    <input name="game" placeholder="Game" required>
    <input name="location" placeholder="Location">
    <input name="founded_year" type="number" placeholder="Founded Year">
    <input name="ranking" type="number" placeholder="Ranking">
    <button type="submit">Add Team</button>
</form>

<table>
    <thead>
        <tr>
            <th>NodeID</th>
            <th>Name</th>
            <th>Game</th>
            <th>Location</th>
            <th>Founded</th>
            <th>Ranking</th>
        </tr>
    </thead>
    <tbody>
        {% for team in teams %}
        <tr>
            <td>{{ team.NodeID }}</td>
            <td><strong>{{ team.Name }}</strong></td>
            <td>{{ team.attr.game }}</td>
            <td>{{ team.attr.location }}</td>
            <td>{{ team.attr.founded }}</td>
            <td>{{ team.attr.ranking }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}

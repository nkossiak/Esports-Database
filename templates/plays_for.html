{% extends 'base.html' %}
{% block content %}
<h2>Plays For Relationships</h2>
<form method="POST">
    <select name="player_id" required>
        <option value="">Select Player</option>
        {% for player in players %}
        <option value="{{ player.NodeID }}">{{ player.Name }}</option>
        {% endfor %}
    </select>
    <select name="team_id" required>
        <option value="">Select Team</option>
        {% for team in teams %}
        <option value="{{ team.NodeID }}">{{ team.Name }}</option>
        {% endfor %}
    </select>
    <button type="submit">Connect Player to Team</button>
</form>

<table>
    <tr><th>EdgeID</th><th>Player</th><th>Team</th></tr>
    {% for row in rows %}
    <tr>
        <td>{{ row.EdgeID }}</td>
        <td>{{ row.player_name }}</td>
        <td>{{ row.team_name }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
